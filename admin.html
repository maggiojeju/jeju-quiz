<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리 — 제주항일기념관 암호 탐험</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#1a1208; --gold:#b8860b; --blue:#1a3a5c;
    --brush:#2c1810; --stamp:#9b2335; --green:#27ae60;
    --paper:#f0ebe0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}

  /* 헤더 */
  header{
    background:var(--brush);color:#f5e8c0;
    padding:.9rem 1.5rem;display:flex;align-items:center;gap:1rem;
    border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:50;
  }
  .h-logo{font-family:'Noto Serif KR',serif;font-size:1.5rem;font-weight:900;color:var(--gold);}
  .h-title{font-family:'Noto Serif KR',serif;font-size:.95rem;font-weight:700;}
  .h-badge{
    margin-left:auto;padding:.2rem .9rem;border-radius:14px;
    font-size:.78rem;font-weight:700;display:none;
  }
  .h-badge.teacher{background:var(--gold);color:var(--brush);}
  .h-badge.student{background:#e8f4fd;color:var(--blue);}

  main{max-width:820px;margin:0 auto;padding:1.5rem;}

  /* 로그인 */
  #login-wrap{
    max-width:420px;margin:3.5rem auto;background:white;
    border-radius:18px;padding:2.2rem 2rem;
    box-shadow:0 4px 28px rgba(0,0,0,.11);text-align:center;
    border-top:4px solid var(--gold);
  }
  .login-icon{font-size:2.6rem;margin-bottom:.7rem;}
  .login-h{font-family:'Noto Serif KR',serif;font-size:1.25rem;font-weight:700;color:var(--blue);margin-bottom:.35rem;}
  .login-p{font-size:.83rem;color:#888;line-height:1.6;margin-bottom:1.4rem;}
  .mode-tabs{display:flex;gap:.5rem;margin-bottom:1.1rem;}
  .mode-tab{
    flex:1;padding:.55rem;border:2px solid #ddd;border-radius:8px;
    background:white;font-size:.85rem;font-family:'Noto Serif KR',serif;
    font-weight:700;cursor:pointer;transition:all .15s;color:#888;
  }
  .mode-tab.on{border-color:var(--blue);background:var(--blue);color:white;}
  .team-chips{display:flex;gap:.5rem;justify-content:center;margin-bottom:.9rem;}
  .chip{
    width:40px;height:40px;border-radius:50%;border:2px solid #ddd;
    background:white;font-family:'Noto Serif KR',serif;font-size:.95rem;
    font-weight:700;cursor:pointer;transition:all .15s;color:#666;
  }
  .chip:hover{border-color:var(--blue);color:var(--blue);}
  .chip.on{background:var(--blue);border-color:var(--blue);color:white;}
  .pw-row{display:flex;gap:.5rem;margin-bottom:.7rem;}
  .pw-input{
    flex:1;padding:.7rem 1rem;border:2px solid #ddd;border-radius:8px;
    font-size:.92rem;text-align:center;letter-spacing:3px;outline:none;
    transition:border-color .2s;
  }
  .pw-input:focus{border-color:var(--blue);}
  .login-btn{
    padding:.7rem 1.1rem;background:var(--blue);color:white;border:none;
    border-radius:8px;font-size:.88rem;font-family:'Noto Serif KR',serif;
    font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s;
  }
  .login-btn:hover{background:var(--brush);}
  .login-err{color:var(--stamp);font-size:.8rem;min-height:1.1em;margin-top:.3rem;}

  /* 공통 에디터 상단 */
  .editor-top{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:1.3rem;padding-bottom:.9rem;
    border-bottom:2px solid #e0d8c8;
  }
  .editor-h{font-family:'Noto Serif KR',serif;font-size:1.25rem;font-weight:700;color:var(--blue);}
  .save-all{
    background:var(--gold);color:var(--brush);border:none;
    padding:.6rem 1.3rem;border-radius:8px;font-size:.85rem;
    font-family:'Noto Serif KR',serif;font-weight:700;cursor:pointer;
    transition:all .15s;letter-spacing:1px;display:flex;align-items:center;gap:.4rem;
  }
  .save-all:hover{background:#a07808;color:white;}

  /* ─────────────────────────────────────
     교사 모드: 문제 입력 카드
  ───────────────────────────────────── */
  #teacher-wrap{display:none;}
  .qcard{
    background:white;border-radius:14px;padding:1.4rem 1.4rem .9rem;
    margin-bottom:1.1rem;border:1px solid #e0d8c8;
    box-shadow:0 2px 8px rgba(0,0,0,.05);position:relative;
  }
  .qcard-num{
    position:absolute;top:-10px;left:1.2rem;
    background:var(--blue);color:white;
    padding:.1rem .75rem;border-radius:10px;font-size:.73rem;font-weight:700;
  }
  .field-group{margin-bottom:.8rem;}
  .field-lbl{
    font-size:.76rem;font-weight:700;color:#666;
    margin-bottom:.3rem;display:flex;align-items:center;gap:.4rem;
  }
  .tag{padding:.1rem .5rem;border-radius:4px;font-size:.68rem;font-weight:700;}
  .tag-path{background:#deeaf8;color:var(--blue);}
  .tag-loc {background:#fadadd;color:var(--stamp);}
  .tag-ans {background:#d6f5e0;color:#1e7a40;}
  textarea,.text-input{
    width:100%;padding:.6rem .85rem;border:2px solid #e0d8c8;border-radius:8px;
    font-size:.86rem;font-family:'Noto Sans KR',sans-serif;color:var(--ink);
    background:#fafaf8;outline:none;resize:vertical;
    transition:border-color .2s;line-height:1.6;
  }
  textarea:focus,.text-input:focus{border-color:var(--blue);background:white;}
  .hint-text{font-size:.72rem;color:#aaa;margin-top:.2rem;}
  .ans-preview-row{display:flex;gap:4px;margin-top:.45rem;flex-wrap:wrap;}
  .abox{
    width:28px;height:28px;border:1.5px solid var(--blue);border-radius:4px;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:.85rem;color:var(--blue);background:#f0f5fa;
  }
  .qcard-footer{
    display:flex;align-items:center;gap:.5rem;
    padding-top:.75rem;margin-top:.75rem;
    border-top:1px solid #eee;font-size:.78rem;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:#ddd;flex-shrink:0;}
  .dot.saved  {background:var(--green);}
  .dot.unsaved{background:var(--gold);}
  .status-txt{color:#999;}
  .save-one{
    margin-left:auto;background:transparent;color:var(--blue);
    border:1.5px solid var(--blue);padding:.28rem .85rem;border-radius:6px;
    font-size:.75rem;cursor:pointer;transition:all .15s;
    font-family:'Noto Sans KR',sans-serif;font-weight:700;
  }
  .save-one:hover{background:var(--blue);color:white;}

  /* ─────────────────────────────────────
     학생 모드: 배경 이미지 업로드
  ───────────────────────────────────── */
  #student-wrap{display:none;}

  /* 안내 배너 */
  .guide-banner{
    background:linear-gradient(135deg,#fff8e8,#fef0d0);
    border:1.5px solid var(--gold);border-radius:12px;
    padding:1.1rem 1.4rem;margin-bottom:1.4rem;
  }
  .guide-title{
    font-family:'Noto Serif KR',serif;font-size:.92rem;font-weight:700;
    color:var(--brush);margin-bottom:.7rem;
    display:flex;align-items:center;gap:.4rem;
  }
  .guide-steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.55rem;}
  .guide-step{
    background:white;border-radius:8px;padding:.65rem .85rem;
    border:1px solid #ead8a0;font-size:.79rem;line-height:1.5;color:#5a4020;
  }
  .guide-step strong{display:block;font-size:.72rem;color:var(--gold);font-weight:700;margin-bottom:.15rem;}

  /* 배경 업로드 카드 3장 */
  .bg-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;}
  .bg-card{
    background:white;border-radius:14px;padding:1.1rem;
    border:1px solid #e0d8c8;box-shadow:0 2px 8px rgba(0,0,0,.05);
    text-align:center;
  }
  .bg-card-title{
    font-family:'Noto Serif KR',serif;font-size:.85rem;font-weight:700;
    color:var(--blue);margin-bottom:.25rem;
  }
  .bg-card-sub{font-size:.72rem;color:#999;margin-bottom:.9rem;line-height:1.5;}

  /* 이미지 미리보기 / 업로드 영역 */
  .img-zone{
    width:100%;aspect-ratio:16/9;
    border:2px dashed #ddd;border-radius:10px;
    background:#f8f5ef;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:.4rem;cursor:pointer;position:relative;
    overflow:hidden;transition:border-color .2s;
    margin-bottom:.7rem;
  }
  .img-zone:hover{border-color:var(--blue);}
  .img-zone.has-img{border-style:solid;border-color:#c8e0f0;}
  .img-zone input[type=file]{
    position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
  }
  .img-zone img{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;border-radius:8px;
  }
  .img-zone .upload-icon{font-size:1.8rem;color:#ccc;pointer-events:none;}
  .img-zone .upload-txt{font-size:.72rem;color:#aaa;pointer-events:none;}
  .img-zone .img-overlay{
    position:absolute;inset:0;background:rgba(0,0,0,.35);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:.3rem;opacity:0;transition:opacity .2s;border-radius:8px;
  }
  .img-zone:hover .img-overlay{opacity:1;}
  .img-zone .img-overlay span{color:white;font-size:.75rem;font-weight:700;}

  /* 업로드 버튼 + 삭제 버튼 */
  .img-actions{display:flex;gap:.5rem;}
  .img-upload-btn{
    flex:1;background:var(--blue);color:white;border:none;
    padding:.5rem;border-radius:7px;font-size:.78rem;font-weight:700;
    cursor:pointer;transition:background .15s;font-family:'Noto Sans KR',sans-serif;
    display:flex;align-items:center;justify-content:center;gap:.3rem;
  }
  .img-upload-btn:hover{background:var(--brush);}
  .img-upload-btn:disabled{background:#ccc;cursor:default;}
  .img-del-btn{
    background:transparent;color:#e74c3c;border:1.5px solid #e74c3c;
    padding:.5rem .7rem;border-radius:7px;font-size:.75rem;
    cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;
    display:none;
  }
  .img-del-btn:hover{background:#fff5f5;}

  /* 업로드 진행바 */
  .upload-prog{
    height:4px;background:#eee;border-radius:2px;margin-top:.5rem;display:none;
  }
  .upload-prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;}

  /* 문제 미리보기 (학생 모드에서 읽기 전용) */
  .q-preview-section{margin-top:.5rem;}
  .q-preview-title{
    font-family:'Noto Serif KR',serif;font-size:1rem;font-weight:700;
    color:var(--blue);margin-bottom:.8rem;
    padding-bottom:.6rem;border-bottom:1px solid #e0d8c8;
  }
  .q-preview-card{
    background:white;border-radius:10px;padding:.9rem 1rem;
    margin-bottom:.7rem;border:1px solid #e8e0d0;
  }
  .q-preview-num{
    font-size:.72rem;font-weight:700;color:var(--blue);
    margin-bottom:.5rem;letter-spacing:.5px;
  }
  .q-preview-row{display:flex;gap:.6rem;margin-bottom:.4rem;align-items:flex-start;}
  .q-preview-tag{
    font-size:.65rem;font-weight:700;padding:.1rem .45rem;border-radius:4px;
    white-space:nowrap;flex-shrink:0;margin-top:.1rem;
  }
  .q-preview-val{font-size:.82rem;color:#444;line-height:1.55;}
  .q-ans{font-size:.8rem;color:var(--blue);font-weight:700;margin-top:.3rem;}

  /* 토스트 */
  .toast{
    position:fixed;bottom:2rem;left:50%;
    transform:translateX(-50%) translateY(80px);
    background:var(--ink);color:#f5e8c0;
    padding:.7rem 1.4rem;border-radius:8px;font-size:.85rem;
    z-index:999;transition:transform .3s;pointer-events:none;
  }
  .toast.show{transform:translateX(-50%) translateY(0);}

  @media(max-width:600px){
    .bg-cards{grid-template-columns:1fr;}
    .guide-steps{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>

<header>

  <div class="h-title">제주항일기념관 암호 탐험 — 관리</div>
  <div class="h-badge" id="h-badge"></div>
</header>

<!-- 로그인 -->
<div id="login-wrap">
  <div class="login-icon">🔐</div>
  <div class="login-h">접속 유형을 선택하세요</div>
  <div class="login-p">교사는 문제를 입력하고,<br>학생은 배경 이미지를 업로드합니다.</div>

  <div class="mode-tabs">
    <button class="mode-tab on" id="tab-teacher" onclick="setMode('teacher')">👩‍🏫 교사</button>
    <button class="mode-tab"   id="tab-student" onclick="setMode('student')">🧑‍🎓 학생</button>
  </div>

  <!-- 학생일 때만 팀 선택 표시 -->
  <div id="chip-wrap" style="display:none;">
    <div class="team-chips" id="chips"></div>
  </div>

  <div class="pw-row">
    <input type="password" class="pw-input" id="pw"
           placeholder="비밀번호" maxlength="12"
           onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">입장</button>
  </div>
  <div class="login-err" id="lerr"></div>
</div>

<!-- 교사 모드 -->
<main>
  <div id="teacher-wrap">
    <div class="editor-top">
      <div class="editor-h" id="teacher-h">문제 입력</div>
      <button class="save-all" onclick="saveAll()">💾 전체 저장</button>
    </div>
    <div id="t-cards"></div>
  </div>

  <!-- 학생 모드 -->
  <div id="student-wrap">
    <div class="editor-top">
      <div class="editor-h" id="student-h">배경 이미지 업로드</div>
    </div>

    <!-- 캔바 가이드 -->
    <div class="guide-banner">
      <div class="guide-title">🎨 배경 이미지를 업로드하세요</div>
      <div class="guide-steps">
        <div class="guide-step"><strong>STEP 1 — 캔바에서 완성</strong>선생님이 공유한 템플릿으로 3장의 배경을 만드세요.</div>
        <div class="guide-step"><strong>STEP 2 — PNG로 저장</strong>공유 → 다운로드 → PNG → 최고 품질</div>
        <div class="guide-step"><strong>STEP 3 — 여기서 업로드</strong>아래 각 칸에 맞는 배경을 올리세요.</div>
        <div class="guide-step"><strong>STEP 4 — 확인</strong>체험 페이지를 새로고침하면 배경이 바뀝니다!</div>
      </div>
    </div>

    <!-- 배경 이미지 3장 업로드 -->
    <div class="bg-cards" id="bg-cards"></div>

    <!-- 문제 미리보기 (읽기 전용) -->
    <div class="q-preview-section">
      <div class="q-preview-title">📋 우리 팀 문제 미리보기 (수정 불가)</div>
      <div id="q-previews"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<!-- ════════════════════════════════════════
  Firebase SDK
════════════════════════════════════════ -->
<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sref, uploadBytesResumable, getDownloadURL, deleteObject }
       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

/* ★ Firebase 설정 — 세 파일 동일하게 입력 */
const firebaseConfig = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT.firebaseapp.com",
  databaseURL:       "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId:         "YOUR_PROJECT",
  storageBucket:     "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const st  = getStorage(app);

/* ★ 비밀번호 설정 */
const PW_TEACHER = 'teacher0000';           // 교사 비밀번호
const PW_STUDENT = { A:'1111', B:'2222', C:'3333', D:'4444', E:'5555' };

const TEAMS = ['A','B','C','D','E'];
const TC    = { A:'#c0392b', B:'#2980b9', C:'#27ae60', D:'#8e44ad', E:'#e67e22' };
const BG_LABELS = ['팀 선택 화면','퀴즈 화면','결과 화면'];
const BG_FILES  = (t,n) => `bg-${t}-${n}.png`; // Storage 경로용

let mode = 'teacher'; // 'teacher' | 'student'
let team = null;
let qData = Array.from({length:6}, ()=>({pathClue:'',locClue:'',question:'',answer:'',saved:false}));

/* ── 모드 탭 ── */
window.setMode = m => {
  mode = m;
  document.getElementById('tab-teacher').classList.toggle('on', m==='teacher');
  document.getElementById('tab-student').classList.toggle('on', m==='student');
  document.getElementById('chip-wrap').style.display = m==='student' ? 'block' : 'none';
  document.getElementById('lerr').textContent = '';
};

/* 팀 칩 렌더 */
document.getElementById('chips').innerHTML = TEAMS.map(t=>
  `<button class="chip" onclick="pickTeam('${t}')" id="chip-${t}">${t}</button>`
).join('');
window.pickTeam = t => {
  team = t;
  TEAMS.forEach(x=>document.getElementById(`chip-${x}`).classList.remove('on'));
  document.getElementById(`chip-${t}`).classList.add('on');
};

/* ── 로그인 ── */
window.doLogin = async () => {
  const err = document.getElementById('lerr');
  err.textContent = '';
  const pw = document.getElementById('pw').value;

  if (mode === 'teacher') {
    if (pw !== PW_TEACHER) { err.textContent = '비밀번호가 틀렸습니다.'; return; }
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('teacher-wrap').style.display = 'block';
    const badge = document.getElementById('h-badge');
    badge.style.display = ''; badge.className = 'h-badge teacher';
    badge.textContent = '교사 모드';
    await loadQuestions();
  } else {
    if (!team) { err.textContent = '팀을 선택해 주세요.'; return; }
    if (pw !== PW_STUDENT[team]) { err.textContent = '비밀번호가 틀렸습니다.'; return; }
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('student-wrap').style.display = 'block';
    const badge = document.getElementById('h-badge');
    badge.style.display = ''; badge.className = 'h-badge student';
    badge.textContent = team + '팀';
    document.getElementById('student-h').textContent = `${team}팀 배경 이미지 업로드`;
    await loadStudentView();
  }
};

/* ════════════════════════════════════════
   교사 모드 — 문제 입력
════════════════════════════════════════ */
async function loadQuestions() {
  // 모든 팀 탭을 교사 에디터에 추가
  const wrap = document.getElementById('t-cards');
  // 팀 탭 헤더
  wrap.innerHTML = `
    <div style="display:flex;gap:.5rem;margin-bottom:1.2rem;flex-wrap:wrap;" id="t-team-tabs">
      ${TEAMS.map(t=>`<button class="mode-tab ${t==='A'?'on':''}" id="tt-${t}"
        onclick="switchTeamTab('${t}')" style="flex:none;padding:.4rem 1rem;font-size:.82rem;">${t}팀</button>`).join('')}
    </div>
    ${TEAMS.map(t=>`<div id="tteam-${t}" style="display:${t==='A'?'block':'none'}">
      <div id="cards-${t}"></div>
    </div>`).join('')}
  `;
  for (const t of TEAMS) await loadTeamCards(t);
}

window.switchTeamTab = t => {
  TEAMS.forEach(x=>{
    document.getElementById(`tt-${x}`).classList.toggle('on', x===t);
    document.getElementById(`tteam-${x}`).style.display = x===t?'block':'none';
  });
};

async function loadTeamCards(t) {
  let data = Array.from({length:6},()=>({pathClue:'',locClue:'',question:'',answer:'',saved:false}));
  try {
    const snap = await get(ref(db,`questions/${t}`));
    if (snap.exists()&&Array.isArray(snap.val()))
      snap.val().forEach((q,i)=>{ if(data[i]) data[i]={...q,saved:true}; });
  } catch(e){ console.error(e); }

  document.getElementById(`cards-${t}`).innerHTML = data.map((_,i)=>`
    <div class="qcard" id="qc-${t}-${i}">
      <div class="qcard-num">${i+1}번 문제</div>
      <div class="field-group">
        <div class="field-lbl"><span class="tag tag-path">길잡이 암호</span></div>
        <textarea rows="2" id="path-${t}-${i}" oninput="markU('${t}',${i})"
          placeholder="예: 1층 자동문 위, 시계가 바라보는 곳">${data[i].pathClue||''}</textarea>
      </div>
      <div class="field-group">
        <div class="field-lbl"><span class="tag tag-loc">위치 암호</span></div>
        <textarea rows="2" id="loc-${t}-${i}" oninput="markU('${t}',${i})"
          placeholder="예: 둥근 천장 아래 빛이 보이는 곳">${data[i].locClue||''}</textarea>
      </div>
      <div class="field-group">
        <div class="field-lbl">□□ 문제</div>
        <textarea rows="3" id="q-${t}-${i}" oninput="markU('${t}',${i})"
          placeholder="예: 제주인들의 □□정신을 5인의 군상으로 상징화하였다.">${data[i].question||''}</textarea>
      </div>
      <div class="field-group">
        <div class="field-lbl"><span class="tag tag-ans">정답</span></div>
        <input type="text" class="text-input" id="ans-${t}-${i}" maxlength="20"
               value="${data[i].answer||''}"
               oninput="updPrev('${t}',${i}); markU('${t}',${i})"
               placeholder="예: 항일">
        <div class="hint-text">※ 글자 수만큼 □칸이 체험 페이지에 표시됩니다</div>
        <div class="ans-preview-row" id="prev-${t}-${i}">${mkPrev(data[i].answer||'')}</div>
      </div>
      <div class="qcard-footer">
        <div class="dot ${data[i].saved?'saved':'unsaved'}" id="dot-${t}-${i}"></div>
        <span class="status-txt" id="stxt-${t}-${i}">${data[i].saved?'저장됨':'미저장'}</span>
        <button class="save-one" onclick="saveOne('${t}',${i})">저장</button>
      </div>
    </div>
  `).join('');
}

function mkPrev(ans){ return (ans||'').split('').map(c=>`<div class="abox">${c}</div>`).join(''); }
window.updPrev = (t,i) => {
  document.getElementById(`prev-${t}-${i}`).innerHTML = mkPrev(document.getElementById(`ans-${t}-${i}`).value);
};
window.markU = (t,i) => {
  const dot=document.getElementById(`dot-${t}-${i}`);
  const txt=document.getElementById(`stxt-${t}-${i}`);
  if(dot){dot.className='dot unsaved';txt.textContent='미저장';}
};

function gatherTeam(t){
  return Array.from({length:6},(_,i)=>({
    pathClue: document.getElementById(`path-${t}-${i}`)?.value.trim()||'',
    locClue:  document.getElementById(`loc-${t}-${i}`)?.value.trim()||'',
    question: document.getElementById(`q-${t}-${i}`)?.value.trim()||'',
    answer:   document.getElementById(`ans-${t}-${i}`)?.value.trim()||''
  }));
}

window.saveOne = async (t,i) => {
  const q = gatherTeam(t)[i];
  if(!q.question){ toast('문제를 입력해 주세요!'); return; }
  if(!q.answer)  { toast('정답을 입력해 주세요!');  return; }
  try {
    await set(ref(db,`questions/${t}`), gatherTeam(t));
    document.getElementById(`dot-${t}-${i}`).className='dot saved';
    document.getElementById(`stxt-${t}-${i}`).textContent='저장됨';
    toast(`${t}팀 ${i+1}번 저장 완료! ✅`);
  } catch(e){ toast('저장 실패. 인터넷을 확인하세요.'); }
};

window.saveAll = async () => {
  try {
    for(const t of TEAMS) await set(ref(db,`questions/${t}`), gatherTeam(t));
    TEAMS.forEach(t=>Array.from({length:6},(_,i)=>{
      const dot=document.getElementById(`dot-${t}-${i}`);
      const txt=document.getElementById(`stxt-${t}-${i}`);
      if(dot){dot.className='dot saved';txt.textContent='저장됨';}
    }));
    toast('전체 저장 완료! 💾');
  } catch(e){ toast('저장 실패. 인터넷을 확인하세요.'); }
};

/* ════════════════════════════════════════
   학생 모드 — 배경 이미지 업로드
════════════════════════════════════════ */
async function loadStudentView() {
  // 배경 이미지 카드 3장 렌더
  const bgWrap = document.getElementById('bg-cards');
  bgWrap.innerHTML = [1,2,3].map(n=>`
    <div class="bg-card">
      <div class="bg-card-title">${n}번 배경</div>
      <div class="bg-card-sub">${BG_LABELS[n-1]}<br><span style="color:#b8860b;font-size:.68rem;">bg-${team}-${n}.png</span></div>
      <div class="img-zone" id="zone-${n}">
        <input type="file" accept="image/png,image/jpeg,image/webp"
               onchange="uploadBg(${n}, this)">
        <div class="upload-icon">🖼️</div>
        <div class="upload-txt">클릭하거나 파일을 드래그하세요</div>
        <div class="img-overlay"><span>🔄 이미지 교체</span></div>
      </div>
      <div class="upload-prog" id="prog-${n}">
        <div class="upload-prog-fill" id="prog-fill-${n}" style="width:0%"></div>
      </div>
      <div class="img-actions">
        <button class="img-upload-btn" id="ubtn-${n}" disabled>
          ⬆ 업로드 중...
        </button>
        <button class="img-del-btn" id="dbtn-${n}" onclick="deleteBg(${n})">✕ 삭제</button>
      </div>
    </div>
  `).join('');

  // 기존 업로드된 이미지 불러오기
  for(const n of [1,2,3]) await loadExistingBg(n);

  // 문제 미리보기 불러오기
  await loadQPreview();
}

async function loadExistingBg(n) {
  try {
    const url = await getDownloadURL(sref(st, `backgrounds/${team}/${BG_FILES(team,n)}`));
    showThumb(n, url);
  } catch(e){ /* 아직 없으면 무시 */ }
}

window.uploadBg = (n, input) => {
  const file = input.files[0];
  if (!file) return;
  // 로컬 미리보기 먼저
  const localUrl = URL.createObjectURL(file);
  showThumb(n, localUrl);

  // Firebase Storage 업로드
  const storageRef = sref(st, `backgrounds/${team}/${BG_FILES(team,n)}`);
  const task = uploadBytesResumable(storageRef, file);
  const prog     = document.getElementById(`prog-${n}`);
  const progFill = document.getElementById(`prog-fill-${n}`);
  const ubtn     = document.getElementById(`ubtn-${n}`);

  prog.style.display = 'block';
  ubtn.disabled = true;
  ubtn.textContent = '⬆ 업로드 중...';

  task.on('state_changed',
    snap => {
      const pct = Math.round(snap.bytesTransferred / snap.totalBytes * 100);
      progFill.style.width = pct + '%';
    },
    err => { toast('업로드 실패: ' + err.message); prog.style.display='none'; },
    async () => {
      const url = await getDownloadURL(task.snapshot.ref);
      // DB에 URL 저장 → index.html이 읽어감
      await set(ref(db, `backgrounds/${team}/${n}`), url);
      prog.style.display = 'none';
      ubtn.disabled = false;
      ubtn.textContent = '✅ 업로드 완료';
      setTimeout(()=>{ ubtn.disabled=true; ubtn.textContent='⬆ 업로드 중...'; }, 2000);
      toast(`${n}번 배경 업로드 완료! 체험 페이지를 새로고침하면 반영됩니다 🎉`);
    }
  );
};

window.deleteBg = async n => {
  if (!confirm(`${n}번 배경 이미지를 삭제할까요?`)) return;
  try {
    await deleteObject(sref(st, `backgrounds/${team}/${BG_FILES(team,n)}`));
    await set(ref(db, `backgrounds/${team}/${n}`), null);
    const zone = document.getElementById(`zone-${n}`);
    zone.classList.remove('has-img');
    zone.querySelector('img')?.remove();
    document.getElementById(`dbtn-${n}`).style.display = 'none';
    toast(`${n}번 배경이 삭제되었습니다.`);
  } catch(e){ toast('삭제 실패. 다시 시도해 주세요.'); }
};

function showThumb(n, url) {
  const zone = document.getElementById(`zone-${n}`);
  zone.classList.add('has-img');
  let img = zone.querySelector('img');
  if (!img) { img = document.createElement('img'); zone.prepend(img); }
  img.src = url;
  zone.querySelector('.upload-icon').style.display = 'none';
  zone.querySelector('.upload-txt').style.display  = 'none';
  document.getElementById(`dbtn-${n}`).style.display = 'block';
}

async function loadQPreview() {
  const wrap = document.getElementById('q-previews');
  try {
    const snap = await get(ref(db, `questions/${team}`));
    if (!snap.exists()) { wrap.innerHTML='<p style="color:#aaa;font-size:.85rem;">아직 문제가 입력되지 않았습니다.</p>'; return; }
    const qs = snap.val();
    wrap.innerHTML = qs.map((q,i)=>`
      <div class="q-preview-card">
        <div class="q-preview-num">${i+1}번 암호</div>
        <div class="q-preview-row">
          <span class="q-preview-tag tag-path tag">길잡이</span>
          <span class="q-preview-val">${q.pathClue||'—'}</span>
        </div>
        <div class="q-preview-row">
          <span class="q-preview-tag tag-loc tag">위치</span>
          <span class="q-preview-val">${q.locClue||'—'}</span>
        </div>
        <div class="q-preview-row">
          <span class="q-preview-tag tag" style="background:#eee;color:#555;">문제</span>
          <span class="q-preview-val">${q.question||'—'}</span>
        </div>
        <div class="q-ans">정답: ${q.answer||'—'}</div>
      </div>
    `).join('');
  } catch(e){ wrap.innerHTML='<p style="color:#e74c3c;font-size:.85rem;">문제를 불러오지 못했습니다.</p>'; }
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}
</script>
