<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이미지 업로드 — 제주항일기념관</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --gold:#b8860b; --blue:#1a3a5c; --brush:#2c1810; --green:#27ae60; --red:#e74c3c; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:#f0ebe0;color:#1a1208;min-height:100vh;}

  header{
    background:var(--brush);color:#f5e8c0;
    padding:.9rem 1.5rem;display:flex;align-items:center;gap:1rem;
    border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:50;
  }
  .h-title{font-family:'Noto Serif KR',serif;font-size:.95rem;font-weight:700;}
  .h-badge{margin-left:auto;padding:.2rem .9rem;border-radius:14px;font-size:.78rem;font-weight:700;display:none;}
  .h-badge.teacher{background:var(--gold);color:var(--brush);}
  .h-badge.student{background:#e8f4fd;color:var(--blue);}

  main{max-width:960px;margin:0 auto;padding:1.5rem;}

  /* 로그인 */
  #login-wrap{
    max-width:400px;margin:3.5rem auto;background:white;
    border-radius:18px;padding:2.2rem 2rem;
    box-shadow:0 4px 28px rgba(0,0,0,.11);text-align:center;
    border-top:4px solid var(--gold);
  }
  .login-icon{font-size:2.6rem;margin-bottom:.7rem;}
  .login-h{font-family:'Noto Serif KR',serif;font-size:1.2rem;font-weight:700;color:var(--blue);margin-bottom:.3rem;}
  .login-p{font-size:.83rem;color:#888;line-height:1.6;margin-bottom:1.3rem;}
  .mode-tabs{display:flex;gap:.5rem;margin-bottom:1rem;}
  .mode-tab{flex:1;padding:.5rem;border:2px solid #ddd;border-radius:8px;background:white;font-size:.85rem;font-family:'Noto Serif KR',serif;font-weight:700;cursor:pointer;transition:all .15s;color:#888;}
  .mode-tab.on{border-color:var(--blue);background:var(--blue);color:white;}
  .team-chips{display:flex;gap:.5rem;justify-content:center;margin-bottom:.9rem;}
  .chip{width:40px;height:40px;border-radius:50%;border:2px solid #ddd;background:white;font-family:'Noto Serif KR',serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .15s;color:#666;}
  .chip:hover{border-color:var(--blue);color:var(--blue);}
  .chip.on{background:var(--blue);border-color:var(--blue);color:white;}
  .pw-row{display:flex;gap:.5rem;margin-bottom:.7rem;}
  .pw-input{flex:1;padding:.7rem 1rem;border:2px solid #ddd;border-radius:8px;font-size:.92rem;text-align:center;letter-spacing:3px;outline:none;transition:border-color .2s;}
  .pw-input:focus{border-color:var(--blue);}
  .login-btn{padding:.7rem 1.1rem;background:var(--blue);color:white;border:none;border-radius:8px;font-size:.88rem;font-family:'Noto Serif KR',serif;font-weight:700;cursor:pointer;white-space:nowrap;}
  .login-btn:hover{background:var(--brush);}
  .login-err{color:#e74c3c;font-size:.8rem;min-height:1.1em;margin-top:.3rem;}

  /* 팀 탭 */
  #upload-wrap{display:none;}
  .team-tabs{display:flex;gap:.4rem;margin-bottom:1.5rem;flex-wrap:wrap;}
  .team-tab{padding:.4rem 1.1rem;border:2px solid #ddd;border-radius:8px;background:white;font-size:.82rem;font-family:'Noto Serif KR',serif;font-weight:700;cursor:pointer;transition:all .15s;color:#888;}
  .team-tab.on{background:var(--blue);border-color:var(--blue);color:white;}

  /* 섹션 제목 */
  .sec-title{
    font-family:'Noto Serif KR',serif;font-size:1rem;font-weight:700;
    color:var(--blue);margin:1.5rem 0 .8rem;
    padding-bottom:.6rem;border-bottom:2px solid #e0d8c8;
    display:flex;align-items:center;gap:.5rem;
  }
  .sec-badge{
    font-size:.72rem;font-weight:700;padding:.1rem .6rem;
    border-radius:10px;background:#e8f4fd;color:var(--blue);
  }

  /* 이미지 그리드 */
  .img-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem;margin-bottom:.5rem;}
  .img-grid-6{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem;margin-bottom:.5rem;}

  /* 이미지 카드 */
  .img-card{background:white;border-radius:12px;padding:.9rem;border:1px solid #e0d8c8;box-shadow:0 2px 6px rgba(0,0,0,.05);}
  .img-card-title{font-family:'Noto Serif KR',serif;font-size:.82rem;font-weight:700;color:var(--blue);margin-bottom:.15rem;}
  .img-card-file{font-size:.65rem;color:var(--gold);font-weight:700;background:#fef8e6;padding:.1rem .4rem;border-radius:4px;display:inline-block;margin-bottom:.7rem;}

  /* 드롭존 */
  .zone{
    width:100%;aspect-ratio:16/9;
    border:2px dashed #ccc;border-radius:8px;
    background:#f8f5ef;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:.25rem;cursor:pointer;position:relative;overflow:hidden;
    transition:border-color .2s;margin-bottom:.6rem;
  }
  .zone:hover{border-color:var(--blue);}
  .zone.has{border-style:solid;border-color:#c8e0f0;}
  .zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .zone img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:6px;}
  .zone-ico{font-size:1.5rem;color:#ccc;pointer-events:none;}
  .zone-txt{font-size:.65rem;color:#aaa;pointer-events:none;text-align:center;}
  .zone-hover{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;border-radius:6px;color:white;font-size:.72rem;font-weight:700;pointer-events:none;}
  .zone:hover .zone-hover{opacity:1;}

  /* 버튼 */
  .act-row{display:flex;gap:.4rem;}
  .up-btn{flex:1;background:var(--blue);color:white;border:none;padding:.45rem;border-radius:6px;font-size:.72rem;font-weight:700;cursor:pointer;transition:background .15s;}
  .up-btn:hover{background:var(--brush);}
  .up-btn:disabled{background:#ccc;cursor:default;}
  .del-btn{background:transparent;color:var(--red);border:1.5px solid var(--red);padding:.45rem .6rem;border-radius:6px;font-size:.7rem;cursor:pointer;display:none;}
  .del-btn:hover{background:#fff5f5;}

  /* 진행바 */
  .prog{height:3px;background:#eee;border-radius:2px;margin-top:.4rem;display:none;}
  .prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;}

  /* 상태 */
  .stat{font-size:.68rem;margin-top:.3rem;min-height:.9em;color:#aaa;}
  .stat.ok{color:var(--green);}
  .stat.err{color:var(--red);}

  /* 토스트 */
  .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1208;color:#f5e8c0;padding:.7rem 1.4rem;border-radius:8px;font-size:.85rem;border:1px solid rgba(184,134,11,.4);z-index:999;transition:transform .3s;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  @media(max-width:600px){
    .img-grid-3,.img-grid-6{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header>
  <div class="h-title">이미지 업로드 — 제주항일기념관 암호 탐험</div>
  <div class="h-badge" id="h-badge"></div>
</header>

<div id="login-wrap">
  <div class="login-icon">🖼️</div>
  <div class="login-h">이미지 업로드</div>
  <div class="login-p">접속 유형을 선택하고<br>비밀번호를 입력하세요.</div>
  <div class="mode-tabs">
    <button class="mode-tab on" id="tab-t" onclick="setMode('teacher')">👩‍🏫 교사</button>
    <button class="mode-tab"   id="tab-s" onclick="setMode('student')">🧑‍🎓 학생</button>
  </div>
  <div id="chip-wrap" style="display:none">
    <div class="team-chips" id="chips"></div>
  </div>
  <div class="pw-row">
    <input type="password" class="pw-input" id="pw" placeholder="비밀번호" maxlength="12"
           onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">입장</button>
  </div>
  <div class="login-err" id="lerr"></div>
</div>

<main>
  <div id="upload-wrap">
    <!-- 교사용 팀 탭 -->
    <div id="teacher-tabs" style="display:none">
      <div class="team-tabs" id="team-tabs"></div>
    </div>

    <!-- 전체 배경 섹션 -->
    <div class="sec-title">
      🌄 전체 배경 이미지
      <span class="sec-badge">3장</span>
    </div>
    <div class="img-grid-3" id="bg-grid"></div>

    <!-- 카드 배경 섹션 -->
    <div class="sec-title">
      🃏 문제 카드 배경 이미지
      <span class="sec-badge">6장</span>
    </div>
    <div class="img-grid-6" id="card-grid"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sref, uploadBytesResumable, getDownloadURL, deleteObject }
       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey:            "AIzaSyBm1eKDZF11LSIVScohC4UikGJt_6xE2UM",
  authDomain:        "jeju-antijapanse.firebaseapp.com",
  databaseURL:       "https://jeju-antijapanse-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "jeju-antijapanse",
  storageBucket:     "jeju-antijapanse.firebasestorage.app",
  messagingSenderId: "304584050170",
  appId:             "1:304584050170:web:b7534f22acb15831fb5043"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const st  = getStorage(app);

const PW_TEACHER = 'teacher0000';
const PW_STUDENT = { A:'1111', B:'2222', C:'3333', D:'4444', E:'5555' };
const TEAMS = ['A','B','C','D','E'];
const BG_LABELS   = ['팀 선택 화면','퀴즈 화면','결과 화면'];

let mode = 'teacher', team = null;

window.setMode = m => {
  mode = m;
  document.getElementById('tab-t').classList.toggle('on', m==='teacher');
  document.getElementById('tab-s').classList.toggle('on', m==='student');
  document.getElementById('chip-wrap').style.display = m==='student' ? 'block' : 'none';
};

document.getElementById('chips').innerHTML = TEAMS.map(t=>
  `<button class="chip" onclick="pickTeam('${t}')" id="chip-${t}">${t}</button>`
).join('');
window.pickTeam = t => {
  team = t;
  TEAMS.forEach(x=>document.getElementById(`chip-${x}`).classList.remove('on'));
  document.getElementById(`chip-${t}`).classList.add('on');
};

window.doLogin = async () => {
  const err = document.getElementById('lerr');
  err.textContent = '';
  const pw = document.getElementById('pw').value;
  if (mode==='teacher') {
    if (pw!==PW_TEACHER) { err.textContent='비밀번호가 틀렸습니다.'; return; }
    showUpload('teacher');
  } else {
    if (!team) { err.textContent='팀을 선택해 주세요.'; return; }
    if (pw!==PW_STUDENT[team]) { err.textContent='비밀번호가 틀렸습니다.'; return; }
    showUpload('student', team);
  }
};

function showUpload(m, t) {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('upload-wrap').style.display = 'block';
  const badge = document.getElementById('h-badge');
  badge.style.display = '';
  if (m==='teacher') {
    badge.className='h-badge teacher'; badge.textContent='교사 모드';
    document.getElementById('teacher-tabs').style.display='block';
    renderTeamTabs();
    switchTeam('A');
  } else {
    badge.className='h-badge student'; badge.textContent=t+'팀';
    team = t;
    renderAll(t);
  }
}

function renderTeamTabs() {
  document.getElementById('team-tabs').innerHTML = TEAMS.map(t=>
    `<button class="team-tab ${t==='A'?'on':''}" id="ttab-${t}" onclick="switchTeam('${t}')">${t}팀</button>`
  ).join('');
}

window.switchTeam = t => {
  team = t;
  TEAMS.forEach(x=>document.getElementById(`ttab-${x}`)?.classList.toggle('on',x===t));
  renderAll(t);
};

async function renderAll(t) {
  renderGrid('bg-grid',   [1,2,3].map(n=>({ key:`bg-${t}-${n}`,   label:`${n}번 전체 배경`, sub:BG_LABELS[n-1], file:`bg-${t}-${n}.png`,   path:`backgrounds/${t}/bg-${t}-${n}.png`,   dbPath:`backgrounds/${t}/${n}` })));
  renderGrid('card-grid', [1,2,3,4,5,6].map(n=>({ key:`card-${t}-${n}`, label:`${n}번 문제 카드 배경`, sub:`${n}번 문제`, file:`card-${t}-${n}.png`, path:`cards/${t}/card-${t}-${n}.png`, dbPath:`cards/${t}/${n}` })));
  // 기존 이미지 로드
  for(const n of [1,2,3])     await tryLoadImg(`bg-${t}-${n}`,   `backgrounds/${t}/bg-${t}-${n}.png`);
  for(const n of [1,2,3,4,5,6]) await tryLoadImg(`card-${t}-${n}`, `cards/${t}/card-${t}-${n}.png`);
}

function renderGrid(gridId, items) {
  document.getElementById(gridId).innerHTML = items.map(({key,label,sub,file,path,dbPath})=>`
    <div class="img-card">
      <div class="img-card-title">${label}</div>
      <div class="img-card-file">${file}</div>
      <div class="zone" id="zone-${key}">
        <input type="file" accept="image/png,image/jpeg,image/webp"
               onchange="doUpload('${key}','${path}','${dbPath}',this)">
        <div class="zone-ico">🖼️</div>
        <div class="zone-txt">${sub}<br>클릭 또는 드래그</div>
        <div class="zone-hover">🔄 교체</div>
      </div>
      <div class="prog" id="prog-${key}"><div class="prog-fill" id="fill-${key}" style="width:0%"></div></div>
      <div class="act-row">
        <button class="up-btn" id="ubtn-${key}" disabled>대기 중</button>
        <button class="del-btn" id="dbtn-${key}" onclick="doDelete('${key}','${path}','${dbPath}')">✕</button>
      </div>
      <div class="stat" id="stat-${key}"></div>
    </div>
  `).join('');
}

async function tryLoadImg(key, path) {
  try {
    const url = await getDownloadURL(sref(st, path));
    showThumb(key, url);
    setStat(key,'✅ 업로드됨','ok');
  } catch(e){}
}

window.doUpload = (key, path, dbPath, input) => {
  const file = input.files[0]; if(!file) return;
  showThumb(key, URL.createObjectURL(file));
  const task = uploadBytesResumable(sref(st,path), file);
  const prog = document.getElementById(`prog-${key}`);
  const fill = document.getElementById(`fill-${key}`);
  const ubtn = document.getElementById(`ubtn-${key}`);
  prog.style.display='block'; ubtn.disabled=true; ubtn.textContent='⬆ 업로드 중...';
  setStat(key,'업로드 중...','');
  task.on('state_changed',
    s=>{ fill.style.width=Math.round(s.bytesTransferred/s.totalBytes*100)+'%'; },
    e=>{ prog.style.display='none'; setStat(key,'❌ 실패: '+e.message,'err'); },
    async ()=>{
      const url = await getDownloadURL(task.snapshot.ref);
      await set(ref(db,dbPath), url);
      prog.style.display='none';
      ubtn.disabled=false; ubtn.textContent='🔄 교체';
      setStat(key,'✅ 업로드 완료!','ok');
      toast(`업로드 완료! 체험 페이지에 반영됩니다 🎉`);
    }
  );
};

window.doDelete = async (key, path, dbPath) => {
  if(!confirm('이 이미지를 삭제할까요?')) return;
  try {
    await deleteObject(sref(st,path));
    await set(ref(db,dbPath),null);
    const zone=document.getElementById(`zone-${key}`);
    zone.classList.remove('has');
    zone.querySelector('img')?.remove();
    zone.querySelector('.zone-ico').style.display='';
    zone.querySelector('.zone-txt').style.display='';
    document.getElementById(`dbtn-${key}`).style.display='none';
    document.getElementById(`ubtn-${key}`).disabled=true;
    document.getElementById(`ubtn-${key}`).textContent='대기 중';
    setStat(key,'삭제됨','');
  } catch(e){ toast('삭제 실패: '+e.message); }
};

function showThumb(key, url) {
  const zone=document.getElementById(`zone-${key}`); if(!zone) return;
  zone.classList.add('has');
  let img=zone.querySelector('img');
  if(!img){img=document.createElement('img');zone.prepend(img);}
  img.src=url;
  zone.querySelector('.zone-ico').style.display='none';
  zone.querySelector('.zone-txt').style.display='none';
  document.getElementById(`dbtn-${key}`).style.display='block';
  document.getElementById(`ubtn-${key}`).disabled=false;
  document.getElementById(`ubtn-${key}`).textContent='🔄 교체';
}

function setStat(key,msg,cls){
  const el=document.getElementById(`stat-${key}`); if(!el)return;
  el.textContent=msg; el.className='stat'+(cls?' '+cls:'');
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}
</script>
</body>
</html>
