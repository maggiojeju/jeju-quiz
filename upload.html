<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>배경 이미지 업로드 — 제주항일기념관</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --gold:#b8860b; --blue:#1a3a5c; --brush:#2c1810; --green:#27ae60; --red:#e74c3c; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans KR',sans-serif;background:#f0ebe0;color:#1a1208;min-height:100vh;}

  header{
    background:var(--brush);color:#f5e8c0;
    padding:.9rem 1.5rem;display:flex;align-items:center;gap:1rem;
    border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:50;
  }
  .h-logo{font-family:'Noto Serif KR',serif;font-size:1.5rem;font-weight:900;color:var(--gold);}
  .h-title{font-family:'Noto Serif KR',serif;font-size:.95rem;font-weight:700;}
  .h-badge{margin-left:auto;padding:.2rem .9rem;border-radius:14px;font-size:.78rem;font-weight:700;display:none;}
  .h-badge.teacher{background:var(--gold);color:var(--brush);}
  .h-badge.student{background:#e8f4fd;color:var(--blue);}

  main{max-width:860px;margin:0 auto;padding:1.5rem;}

  /* 로그인 */
  #login-wrap{
    max-width:400px;margin:3.5rem auto;background:white;
    border-radius:18px;padding:2.2rem 2rem;
    box-shadow:0 4px 28px rgba(0,0,0,.11);text-align:center;
    border-top:4px solid var(--gold);
  }
  .login-icon{font-size:2.6rem;margin-bottom:.7rem;}
  .login-h{font-family:'Noto Serif KR',serif;font-size:1.2rem;font-weight:700;color:var(--blue);margin-bottom:.3rem;}
  .login-p{font-size:.83rem;color:#888;line-height:1.6;margin-bottom:1.3rem;}
  .mode-tabs{display:flex;gap:.5rem;margin-bottom:1rem;}
  .mode-tab{
    flex:1;padding:.5rem;border:2px solid #ddd;border-radius:8px;
    background:white;font-size:.85rem;font-family:'Noto Serif KR',serif;
    font-weight:700;cursor:pointer;transition:all .15s;color:#888;
  }
  .mode-tab.on{border-color:var(--blue);background:var(--blue);color:white;}
  .team-chips{display:flex;gap:.5rem;justify-content:center;margin-bottom:.9rem;}
  .chip{
    width:40px;height:40px;border-radius:50%;border:2px solid #ddd;
    background:white;font-family:'Noto Serif KR',serif;font-size:.95rem;
    font-weight:700;cursor:pointer;transition:all .15s;color:#666;
  }
  .chip:hover{border-color:var(--blue);color:var(--blue);}
  .chip.on{background:var(--blue);border-color:var(--blue);color:white;}
  .pw-row{display:flex;gap:.5rem;margin-bottom:.7rem;}
  .pw-input{
    flex:1;padding:.7rem 1rem;border:2px solid #ddd;border-radius:8px;
    font-size:.92rem;text-align:center;letter-spacing:3px;outline:none;transition:border-color .2s;
  }
  .pw-input:focus{border-color:var(--blue);}
  .login-btn{
    padding:.7rem 1.1rem;background:var(--blue);color:white;border:none;
    border-radius:8px;font-size:.88rem;font-family:'Noto Serif KR',serif;
    font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s;
  }
  .login-btn:hover{background:var(--brush);}
  .login-err{color:#e74c3c;font-size:.8rem;min-height:1.1em;margin-top:.3rem;}

  /* 공통 섹션 */
  #upload-wrap{display:none;}
  .section-title{
    font-family:'Noto Serif KR',serif;font-size:1.1rem;font-weight:700;
    color:var(--blue);margin-bottom:1rem;padding-bottom:.7rem;
    border-bottom:2px solid #e0d8c8;display:flex;align-items:center;
    justify-content:space-between;
  }

  /* 팀 탭 (교사용) */
  .team-tabs{display:flex;gap:.4rem;margin-bottom:1.2rem;flex-wrap:wrap;}
  .team-tab{
    padding:.4rem 1.1rem;border:2px solid #ddd;border-radius:8px;
    background:white;font-size:.82rem;font-family:'Noto Serif KR',serif;
    font-weight:700;cursor:pointer;transition:all .15s;color:#888;
  }
  .team-tab.on{background:var(--blue);border-color:var(--blue);color:white;}

  /* 배경 카드 3장 그리드 */
  .bg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;}

  .bg-card{
    background:white;border-radius:14px;padding:1.1rem;
    border:1px solid #e0d8c8;box-shadow:0 2px 8px rgba(0,0,0,.05);
  }
  .bg-card-title{
    font-family:'Noto Serif KR',serif;font-size:.88rem;font-weight:700;
    color:var(--blue);margin-bottom:.2rem;
  }
  .bg-card-sub{font-size:.72rem;color:#999;margin-bottom:.85rem;line-height:1.5;}
  .bg-card-file{
    font-size:.68rem;color:var(--gold);font-weight:700;
    background:#fef8e6;padding:.1rem .4rem;border-radius:4px;
    display:inline-block;margin-bottom:.85rem;
  }

  /* 이미지 드롭존 */
  .img-zone{
    width:100%;aspect-ratio:16/9;
    border:2px dashed #ccc;border-radius:10px;
    background:#f8f5ef;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:.3rem;cursor:pointer;position:relative;
    overflow:hidden;transition:border-color .2s;margin-bottom:.7rem;
  }
  .img-zone:hover{border-color:var(--blue);}
  .img-zone.has-img{border-style:solid;border-color:#c8e0f0;}
  .img-zone input[type=file]{
    position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
  }
  .img-zone img{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;border-radius:8px;
  }
  .zone-icon{font-size:1.8rem;color:#ccc;pointer-events:none;}
  .zone-txt{font-size:.7rem;color:#aaa;pointer-events:none;text-align:center;}
  .img-hover{
    position:absolute;inset:0;background:rgba(0,0,0,.35);
    display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .2s;border-radius:8px;
    color:white;font-size:.75rem;font-weight:700;pointer-events:none;
  }
  .img-zone:hover .img-hover{opacity:1;}

  /* 액션 버튼 */
  .img-actions{display:flex;gap:.5rem;}
  .up-btn{
    flex:1;background:var(--blue);color:white;border:none;
    padding:.5rem;border-radius:7px;font-size:.78rem;font-weight:700;
    cursor:pointer;transition:background .15s;
    display:flex;align-items:center;justify-content:center;gap:.3rem;
  }
  .up-btn:hover{background:var(--brush);}
  .up-btn:disabled{background:#ccc;cursor:default;}
  .del-btn{
    background:transparent;color:var(--red);border:1.5px solid var(--red);
    padding:.5rem .7rem;border-radius:7px;font-size:.75rem;
    cursor:pointer;transition:all .15s;display:none;
  }
  .del-btn:hover{background:#fff5f5;}

  /* 업로드 진행바 */
  .prog-wrap{height:4px;background:#eee;border-radius:2px;margin-top:.45rem;display:none;}
  .prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;}

  /* 상태 표시 */
  .img-status{font-size:.72rem;margin-top:.35rem;min-height:1em;color:#888;}
  .img-status.ok{color:var(--green);}
  .img-status.err{color:var(--red);}

  /* 안내 배너 */
  .info-banner{
    background:linear-gradient(135deg,#fff8e8,#fef0d0);
    border:1.5px solid var(--gold);border-radius:12px;
    padding:1rem 1.3rem;margin-bottom:1.3rem;
    font-size:.82rem;color:#5a4020;line-height:1.7;
  }
  .info-banner strong{color:var(--brush);}

  /* 토스트 */
  .toast{
    position:fixed;bottom:2rem;left:50%;
    transform:translateX(-50%) translateY(80px);
    background:#1a1208;color:#f5e8c0;
    padding:.7rem 1.4rem;border-radius:8px;font-size:.85rem;
    border:1px solid rgba(184,134,11,.4);
    z-index:999;transition:transform .3s;pointer-events:none;
  }
  .toast.show{transform:translateX(-50%) translateY(0);}

  @media(max-width:600px){
    .bg-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header>

  <div class="h-title">배경 이미지 업로드 — 제주항일기념관 암호 탐험</div>
  <div class="h-badge" id="h-badge"></div>
</header>

<!-- 로그인 -->
<div id="login-wrap">
  <div class="login-icon">🖼️</div>
  <div class="login-h">배경 이미지 업로드</div>
  <div class="login-p">접속 유형을 선택하고<br>비밀번호를 입력하세요.</div>
  <div class="mode-tabs">
    <button class="mode-tab on" id="tab-t" onclick="setMode('teacher')">👩‍🏫 교사</button>
    <button class="mode-tab"   id="tab-s" onclick="setMode('student')">🧑‍🎓 학생</button>
  </div>
  <div id="chip-wrap" style="display:none">
    <div class="team-chips" id="chips"></div>
  </div>
  <div class="pw-row">
    <input type="password" class="pw-input" id="pw"
           placeholder="비밀번호" maxlength="12"
           onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">입장</button>
  </div>
  <div class="login-err" id="lerr"></div>
</div>

<!-- 업로드 메인 -->
<main>
  <div id="upload-wrap">

    <!-- 안내 -->
    <div class="info-banner" id="info-banner">
      🎨 <strong>캔바에서 만든 PNG 파일을 아래 칸에 올려주세요.</strong><br>
      각 칸에 맞는 배경을 넣으면 체험 페이지에 바로 반영됩니다.
      업로드 후 <a href="index.html" target="_blank" style="color:var(--blue)">체험 페이지</a>를 새로고침해서 확인하세요.
    </div>

    <!-- 교사용: 팀 탭 -->
    <div id="teacher-tabs" style="display:none">
      <div class="section-title">팀 선택</div>
      <div class="team-tabs" id="team-tabs"></div>
    </div>

    <!-- 업로드 카드 -->
    <div class="section-title">
      <span id="upload-section-title">배경 이미지 (3장)</span>
    </div>
    <div class="bg-grid" id="bg-grid"></div>

  </div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sref, uploadBytesResumable, getDownloadURL, deleteObject }
       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

/* ★ Firebase 설정 */
const firebaseConfig = {
  apiKey:            "AIzaSyBm1eKDZF11LSIVScohC4UikGJt_6xE2UM",
  authDomain:        "jeju-antijapanse.firebaseapp.com",
  databaseURL:       "https://jeju-antijapanse-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "jeju-antijapanse",
  storageBucket:     "jeju-antijapanse.firebasestorage.app",
  messagingSenderId: "304584050170",
  appId:             "1:304584050170:web:b7534f22acb15831fb5043"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const st  = getStorage(app);

/* ★ 비밀번호 */
const PW_TEACHER = 'teacher0000';
const PW_STUDENT = { A:'1111', B:'2222', C:'3333', D:'4444', E:'5555' };

const TEAMS = ['A','B','C','D','E'];
const TC    = { A:'#c0392b', B:'#2980b9', C:'#27ae60', D:'#8e44ad', E:'#e67e22' };
const BG_LABELS = ['팀 선택 화면','퀴즈 화면','결과 화면'];

let mode = 'teacher', team = null;

/* 모드 탭 */
window.setMode = m => {
  mode = m;
  document.getElementById('tab-t').classList.toggle('on', m==='teacher');
  document.getElementById('tab-s').classList.toggle('on', m==='student');
  document.getElementById('chip-wrap').style.display = m==='student' ? 'block' : 'none';
};

/* 팀 칩 */
document.getElementById('chips').innerHTML = TEAMS.map(t=>
  `<button class="chip" onclick="pickTeam('${t}')" id="chip-${t}">${t}</button>`
).join('');
window.pickTeam = t => {
  team = t;
  TEAMS.forEach(x=>document.getElementById(`chip-${x}`).classList.remove('on'));
  document.getElementById(`chip-${t}`).classList.add('on');
};

/* 로그인 */
window.doLogin = async () => {
  const err = document.getElementById('lerr');
  err.textContent = '';
  const pw = document.getElementById('pw').value;

  if (mode === 'teacher') {
    if (pw !== PW_TEACHER) { err.textContent = '비밀번호가 틀렸습니다.'; return; }
    showUpload('teacher');
  } else {
    if (!team) { err.textContent = '팀을 선택해 주세요.'; return; }
    if (pw !== PW_STUDENT[team]) { err.textContent = '비밀번호가 틀렸습니다.'; return; }
    showUpload('student', team);
  }
};

function showUpload(m, t) {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('upload-wrap').style.display = 'block';
  const badge = document.getElementById('h-badge');
  badge.style.display = '';
  if (m === 'teacher') {
    badge.className = 'h-badge teacher'; badge.textContent = '교사 모드';
    document.getElementById('teacher-tabs').style.display = 'block';
    renderTeamTabs();
    switchTeam('A');
  } else {
    badge.className = 'h-badge student'; badge.textContent = t + '팀';
    document.getElementById('upload-section-title').textContent = `${t}팀 배경 이미지 (3장)`;
    renderBgCards(t);
  }
}

/* 교사용 팀 탭 */
function renderTeamTabs() {
  document.getElementById('team-tabs').innerHTML = TEAMS.map(t=>
    `<button class="team-tab ${t==='A'?'on':''}" id="ttab-${t}"
             onclick="switchTeam('${t}')">${t}팀</button>`
  ).join('');
}

window.switchTeam = t => {
  team = t;
  TEAMS.forEach(x=>document.getElementById(`ttab-${x}`)?.classList.toggle('on',x===t));
  document.getElementById('upload-section-title').textContent = `${t}팀 배경 이미지 (3장)`;
  renderBgCards(t);
};

/* 배경 카드 3장 렌더 */
async function renderBgCards(t) {
  const grid = document.getElementById('bg-grid');
  grid.innerHTML = [1,2,3].map(n=>`
    <div class="bg-card">
      <div class="bg-card-title">${n}번 배경 — ${BG_LABELS[n-1]}</div>
      <div class="bg-card-file">bg-${t}-${n}.png</div>
      <div class="img-zone" id="zone-${t}-${n}">
        <input type="file" accept="image/png,image/jpeg,image/webp"
               onchange="uploadBg('${t}',${n},this)">
        <div class="zone-icon">🖼️</div>
        <div class="zone-txt">클릭하거나<br>파일을 드래그하세요</div>
        <div class="img-hover">🔄 이미지 교체</div>
      </div>
      <div class="prog-wrap" id="prog-${t}-${n}">
        <div class="prog-fill" id="fill-${t}-${n}" style="width:0%"></div>
      </div>
      <div class="img-actions">
        <button class="up-btn" id="ubtn-${t}-${n}" disabled>대기 중</button>
        <button class="del-btn" id="dbtn-${t}-${n}" onclick="deleteBg('${t}',${n})">✕ 삭제</button>
      </div>
      <div class="img-status" id="stat-${t}-${n}"></div>
    </div>
  `).join('');

  // 기존 이미지 로드
  for (const n of [1,2,3]) {
    try {
      const url = await getDownloadURL(sref(st,`backgrounds/${t}/bg-${t}-${n}.png`));
      showThumb(t,n,url);
      setStatus(t,n,'✅ 업로드됨','ok');
    } catch(e){ /* 없으면 무시 */ }
  }
}

/* 업로드 */
window.uploadBg = (t,n,input) => {
  const file = input.files[0];
  if (!file) return;

  // 로컬 미리보기
  showThumb(t,n,URL.createObjectURL(file));
  setStatus(t,n,'업로드 준비 중...','');

  const storageRef = sref(st,`backgrounds/${t}/bg-${t}-${n}.png`);
  const task = uploadBytesResumable(storageRef,file);
  const prog = document.getElementById(`prog-${t}-${n}`);
  const fill = document.getElementById(`fill-${t}-${n}`);
  const ubtn = document.getElementById(`ubtn-${t}-${n}`);

  prog.style.display='block';
  ubtn.disabled=true; ubtn.textContent='⬆ 업로드 중...';

  task.on('state_changed',
    snap => {
      const pct = Math.round(snap.bytesTransferred/snap.totalBytes*100);
      fill.style.width = pct+'%';
      setStatus(t,n,`업로드 중... ${pct}%`,'');
    },
    err => {
      prog.style.display='none';
      ubtn.disabled=false; ubtn.textContent='다시 시도';
      setStatus(t,n,'❌ 업로드 실패: '+err.message,'err');
    },
    async () => {
      const url = await getDownloadURL(task.snapshot.ref);
      await set(ref(db,`backgrounds/${t}/${n}`), url);
      prog.style.display='none';
      ubtn.disabled=true; ubtn.textContent='✅ 완료';
      setStatus(t,n,'✅ 업로드 완료! 체험 페이지에 반영됩니다.','ok');
      toast(`${t}팀 ${n}번 배경 업로드 완료! 🎉`);
    }
  );
};

/* 삭제 */
window.deleteBg = async (t,n) => {
  if (!confirm(`${t}팀 ${n}번 배경을 삭제할까요?`)) return;
  try {
    await deleteObject(sref(st,`backgrounds/${t}/bg-${t}-${n}.png`));
    await set(ref(db,`backgrounds/${t}/${n}`),null);
    const zone = document.getElementById(`zone-${t}-${n}`);
    zone.classList.remove('has-img');
    zone.querySelector('img')?.remove();
    zone.querySelector('.zone-icon').style.display='';
    zone.querySelector('.zone-txt').style.display='';
    document.getElementById(`dbtn-${t}-${n}`).style.display='none';
    document.getElementById(`ubtn-${t}-${n}`).disabled=true;
    document.getElementById(`ubtn-${t}-${n}`).textContent='대기 중';
    setStatus(t,n,'삭제됨','');
    toast(`${t}팀 ${n}번 배경 삭제 완료`);
  } catch(e){ toast('삭제 실패: '+e.message); }
};

function showThumb(t,n,url) {
  const zone = document.getElementById(`zone-${t}-${n}`);
  if (!zone) return;
  zone.classList.add('has-img');
  let img = zone.querySelector('img');
  if (!img) { img=document.createElement('img'); zone.prepend(img); }
  img.src=url;
  zone.querySelector('.zone-icon').style.display='none';
  zone.querySelector('.zone-txt').style.display='none';
  document.getElementById(`dbtn-${t}-${n}`).style.display='block';
  document.getElementById(`ubtn-${t}-${n}`).disabled=false;
  document.getElementById(`ubtn-${t}-${n}`).textContent='🔄 교체하기';
}

function setStatus(t,n,msg,cls) {
  const el=document.getElementById(`stat-${t}-${n}`);
  if(!el)return;
  el.textContent=msg;
  el.className='img-status'+(cls?' '+cls:'');
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}
</script>
</body>
</html>
